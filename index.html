<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Гласов помощник</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100%; background: #0f0f0f; color: #e8e4dc; font-family: 'Georgia', serif; -webkit-font-smoothing: antialiased; }
button { cursor: pointer; font-family: inherit; }
input { font-family: inherit; }

.app { max-width: 420px; margin: 0 auto; padding: 1.5rem 1.25rem; display: flex; flex-direction: column; gap: 12px; }

.header { display: flex; justify-content: space-between; align-items: center; padding: 4px 0 8px; }
.logo-row { display: flex; align-items: center; gap: 8px; }
.logo-dot { width: 8px; height: 8px; border-radius: 50%; background: #c8b89a; }
.logo-text { font-size: 13px; letter-spacing: 0.12em; color: #a09880; }
.lang-pill { font-size: 11px; letter-spacing: 0.08em; color: #6b6358; border: 0.5px solid #3a3630; padding: 3px 8px; border-radius: 20px; }

.card { background: #171714; border: 0.5px solid #2e2b26; border-radius: 12px; padding: 1rem 1.25rem; display: flex; flex-direction: column; gap: 10px; }
.card-label { font-size: 11px; letter-spacing: 0.1em; color: #6b6358; text-transform: uppercase; }

.key-row { display: flex; gap: 8px; align-items: center; }
.key-input { flex: 1; background: #0f0f0f; border: 0.5px solid #2e2b26; border-radius: 8px; padding: 8px 10px; font-size: 13px; font-family: monospace; color: #e8e4dc; outline: none; min-width: 0; }
.key-input:focus { border-color: #5a5040; }
.show-btn { background: none; border: none; color: #6b6358; padding: 4px; display: flex; align-items: center; flex-shrink: 0; }
.show-btn:hover { color: #a09880; }
.save-btn { background: none; border: 0.5px solid #3a3630; border-radius: 8px; padding: 7px 14px; font-size: 12px; color: #a09880; flex-shrink: 0; transition: all 0.15s; }
.save-btn:hover { border-color: #5a5040; color: #e8e4dc; }
.save-btn.saved { color: #8aad7a; border-color: #3a5030; }
.key-status { font-size: 12px; color: #6b6358; }
.key-status.ok { color: #8aad7a; }

.record-card { background: #171714; border: 0.5px solid #2e2b26; border-radius: 16px; padding: 2.5rem 1.25rem; display: flex; flex-direction: column; align-items: center; gap: 1.25rem; }

.mic-btn { width: 88px; height: 88px; border-radius: 50%; border: 0.5px solid #3a3630; background: #1e1c18; color: #c8b89a; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.mic-btn:hover:not(:disabled) { border-color: #5a5040; background: #252218; }
.mic-btn:active:not(:disabled) { transform: scale(0.96); }
.mic-btn.recording { border-color: #7a3a28; background: #2a1810; color: #e8866a; animation: pulse-ring 1.5s ease-out infinite; }
.mic-btn.processing { opacity: 0.6; cursor: default; }
.mic-btn:disabled { cursor: default; opacity: 0.4; }
@keyframes pulse-ring {
  0%   { box-shadow: 0 0 0 0   rgba(200,90,50,0.3); }
  70%  { box-shadow: 0 0 0 18px rgba(200,90,50,0); }
  100% { box-shadow: 0 0 0 0   rgba(200,90,50,0); }
}

.wave-bars { display: flex; gap: 3px; align-items: center; height: 28px; }
.bar { display: block; width: 3px; border-radius: 2px; background: #e8866a; animation: wavebar 0.8s ease-in-out infinite; }
.bar:nth-child(1){animation-delay:0s}.bar:nth-child(2){animation-delay:.12s}.bar:nth-child(3){animation-delay:.24s}.bar:nth-child(4){animation-delay:.36s}.bar:nth-child(5){animation-delay:.48s}
@keyframes wavebar { 0%,100%{height:4px} 50%{height:22px} }

.spinner { width: 22px; height: 22px; border: 1.5px solid #3a3630; border-top-color: #c8b89a; border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.rec-label { font-size: 13px; color: #6b6358; letter-spacing: 0.04em; text-align: center; }
.rec-label.recording { color: #c07858; }
.rec-label.processing { color: #a09880; }
.timer { font-size: 12px; font-family: monospace; color: #5a5040; letter-spacing: 0.05em; min-height: 16px; }

.result-text { font-size: 15px; line-height: 1.7; color: #e8e4dc; min-height: 64px; white-space: pre-wrap; word-break: break-word; }
.result-text.placeholder { color: #3a3630; font-style: italic; font-size: 14px; }
.raw-text { font-size: 13px; line-height: 1.6; color: #4a4540; min-height: 32px; white-space: pre-wrap; word-break: break-word; font-style: italic; }

.actions { display: flex; gap: 8px; }
.action-btn { flex: 1; padding: 9px 12px; border-radius: 8px; border: 0.5px solid #2e2b26; background: #0f0f0f; color: #6b6358; font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.15s; }
.action-btn:hover:not(:disabled) { border-color: #3a3630; color: #a09880; }
.action-btn:disabled { opacity: 0.3; cursor: default; }
.action-btn.primary { background: #1a1e14; border-color: #3a4830; color: #8aad7a; }
.action-btn.primary:hover:not(:disabled) { background: #20261a; }

.history-section { display: flex; flex-direction: column; gap: 6px; }
.history-header { display: flex; justify-content: space-between; align-items: center; padding: 2px; }
.clear-btn { background: none; border: none; font-size: 12px; color: #3a3630; cursor: pointer; }
.clear-btn:hover { color: #6b6358; }
.history-item { background: #171714; border: 0.5px solid #2e2b26; border-radius: 10px; padding: 10px 14px; cursor: pointer; display: flex; flex-direction: column; gap: 4px; transition: border-color 0.15s; }
.history-item:hover { border-color: #3a3630; }
.history-time { font-size: 11px; font-family: monospace; color: #3a3630; }
.history-preview { font-size: 13px; color: #6b6358; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px); background: #1e1c18; border: 0.5px solid #3a3630; border-radius: 20px; padding: 9px 18px; font-size: 13px; color: #a09880; transition: transform 0.25s ease; pointer-events: none; white-space: nowrap; z-index: 99; }
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="logo-row">
      <div class="logo-dot"></div>
      <span class="logo-text">гласов помощник</span>
    </div>
    <span class="lang-pill">БГ</span>
  </div>

  <div class="card">
    <div class="card-label">OpenAI API ключ</div>
    <div class="key-row">
      <input type="password" id="apiKey" placeholder="sk-..." autocomplete="off" class="key-input" oninput="onKeyInput()" />
      <button class="show-btn" onclick="toggleShow()">
        <svg id="eyeIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
      <button class="save-btn" id="saveBtn" onclick="saveKey()">Запази</button>
    </div>
    <div class="key-status" id="keyStatus">Въведи ключа за разпознаване и пунктуация</div>
  </div>

  <div class="record-card">
    <button class="mic-btn" id="micBtn" onclick="toggle()">
      <svg id="micIcon" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="11" rx="3"/>
        <path d="M5 10a7 7 0 0 0 14 0"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="8" y1="22" x2="16" y2="22"/>
      </svg>
      <div class="wave-bars" id="waveBars" style="display:none">
        <span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span>
      </div>
      <div class="spinner" id="spinner" style="display:none"></div>
    </button>
    <p class="rec-label" id="recLabel">Натисни за запис</p>
    <p class="timer" id="timer"></p>
  </div>

  <div class="card">
    <div class="card-label">Оформен текст</div>
    <p class="result-text placeholder" id="resultText">Текстът ще се появи тук след записването...</p>
    <div class="actions">
      <button class="action-btn" id="copyBtn" disabled onclick="copyText()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Копирай
      </button>
      <button class="action-btn primary" id="shareBtn" disabled onclick="shareText()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
        Сподели
      </button>
    </div>
  </div>

  <div class="card" id="rawCard" style="display:none">
    <div class="card-label">Суров текст (преди оформяне)</div>
    <p class="raw-text" id="rawText"></p>
  </div>

  <div class="history-section" id="historySec" style="display:none">
    <div class="history-header">
      <span class="card-label">История</span>
      <button class="clear-btn" onclick="clearHist()">Изчисти</button>
    </div>
    <div id="historyList"></div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
const $ = id => document.getElementById(id);
let recog = null, isRec = false, timerInt = null, secs = 0;
let history = [], currentText = '', toastTimer = null, showKeyVal = false;

const saved = localStorage.getItem('oai_key');
if (saved) {
  $('apiKey').value = saved;
  $('saveBtn').classList.add('saved');
  $('saveBtn').textContent = '✓';
  $('keyStatus').textContent = 'Ключът е запазен';
  $('keyStatus').className = 'key-status ok';
}

if (!SR) {
  $('recLabel').textContent = 'Отвори в Chrome за гласово разпознаване';
  $('micBtn').disabled = true;
}

function onKeyInput() {
  $('saveBtn').classList.remove('saved');
  $('saveBtn').textContent = 'Запази';
  $('keyStatus').textContent = '';
  $('keyStatus').className = 'key-status';
}

function toggleShow() {
  showKeyVal = !showKeyVal;
  $('apiKey').type = showKeyVal ? 'text' : 'password';
  $('eyeIcon').innerHTML = showKeyVal
    ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
    : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
}

function saveKey() {
  const k = $('apiKey').value.trim();
  if (!k.startsWith('sk-')) { showToast('Невалиден ключ — трябва да започва с sk-'); return; }
  localStorage.setItem('oai_key', k);
  $('saveBtn').classList.add('saved');
  $('saveBtn').textContent = '✓';
  $('keyStatus').textContent = 'Ключът е запазен';
  $('keyStatus').className = 'key-status ok';
  showToast('Запазено');
}

function getKey() { return localStorage.getItem('oai_key') || $('apiKey').value.trim(); }

function toggle() { isRec ? stop() : start(); }

function start() {
  if (!SR) return;
  if (!getKey()) { showToast('Въведи OpenAI API ключ'); return; }
  recog = new SR();
  recog.lang = 'bg-BG';
  recog.continuous = true;
  recog.interimResults = true;
  let finalText = '';
  recog.onresult = e => {
    finalText = ''; let interim = '';
    for (let i = 0; i < e.results.length; i++)
      e.results[i].isFinal ? (finalText += e.results[i][0].transcript) : (interim += e.results[i][0].transcript);
    const d = (finalText + (interim ? ' ' + interim : '')).trim();
    if (d) { $('resultText').textContent = d; $('resultText').className = 'result-text'; }
  };
  recog.onerror = e => {
    if (e.error === 'not-allowed') showToast('Разреши достъп до микрофона');
    else if (e.error !== 'aborted') showToast('Грешка: ' + e.error);
    resetUI(); isRec = false;
  };
  recog.onend = () => { if (isRec) recog.start(); };
  recog.start(); isRec = true;
  $('micBtn').classList.add('recording');
  $('micIcon').style.display = 'none';
  $('waveBars').style.display = 'flex';
  $('recLabel').textContent = 'Записване — натисни за стоп';
  $('recLabel').className = 'rec-label recording';
  secs = 0;
  timerInt = setInterval(() => { secs++; $('timer').textContent = Math.floor(secs/60)+':'+String(secs%60).padStart(2,'0'); }, 1000);
}

function stop() {
  isRec = false; clearInterval(timerInt); $('timer').textContent = '';
  recog.onend = null; recog.stop();
  $('micBtn').classList.remove('recording'); $('micBtn').classList.add('processing');
  $('micIcon').style.display = 'none'; $('waveBars').style.display = 'none'; $('spinner').style.display = 'block';
  $('recLabel').textContent = 'Обработване...'; $('recLabel').className = 'rec-label processing';
  setTimeout(() => {
    const raw = $('resultText').textContent;
    if (!raw.includes('ще се появи') && raw.trim()) {
      polishWithGPT(raw.trim(), getKey());
    } else { showToast('Не е разпознат текст'); resetUI(); }
  }, 400);
}

async function polishWithGPT(raw, key) {
  try {
    const resp = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + key
      },
      body: JSON.stringify({
        model: 'gpt-4o-mini',
        max_tokens: 1000,
        messages: [
          {
            role: 'system',
            content: `Ти си експерт редактор на диктован текст на български език. Получаваш суров текст от гласово разпознаване — без пунктуация, без главни букви — и трябва да го превърнеш в правилно написан текст.

ЗАДЪЛЖИТЕЛНИ ПРАВИЛА ЗА ПУНКТУАЦИЯ:

1. ТОЧКИ — постави точка в края на всяко завършено изречение. Ако изречението завършва с въпрос → въпросителна. Ако е възклицание → удивителна.

2. ГЛАВНИ БУКВИ — ВСЯКО ново изречение започва с главна буква. Собствени имена на хора, градове, държави, фирми — главна буква.

3. ЗАПЕТАИ — постави запетая:
   - пред "но", "а", "или", "обаче", "защото", "тъй като", "въпреки че", "ако", "когато", "докато", "след като", "преди да"
   - при изброяване: "ябълки, круши и сливи"
   - след уводни изрази: "всъщност,", "например,", "разбира се,", "между другото,"
   - при вметнати изрази и пояснения

4. ДВОЕТОЧИЕ — след "следното:", "например:", "а именно:" и преди изброяване

5. ТИРЕ — при рязка смяна на мисълта или при пояснение в средата на изречение

ДОПЪЛНИТЕЛНИ ПРАВИЛА:
- Премахни "ъ", "ем", "ъъъ", "значи" в началото на изречения
- Премахни повтарящи се думи
- НЕ добавяй нови думи, НЕ променяй смисъла
- Върни САМО готовия текст — без обяснения, без коментари

ПРИМЕР:
Вход: "днес отидох до магазина купих хляб мляко и масло после се върнах вкъщи беше много студено навън"
Изход: "Днес отидох до магазина, купих хляб, мляко и масло. После се върнах вкъщи. Беше много студено навън."`
          },
          { role: 'user', content: raw }
        ]
      })
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error?.message || 'OpenAI грешка');
    const polished = data.choices?.[0]?.message?.content?.trim() || raw;
    finalize(polished, raw);
  } catch(e) {
    showToast('Грешка: ' + e.message);
    finalize(raw, null);
  }
}

function finalize(text, raw) {
  currentText = text;
  $('resultText').textContent = text;
  $('resultText').className = 'result-text';
  $('copyBtn').disabled = false; $('shareBtn').disabled = false;
  if (raw && raw !== text) { $('rawText').textContent = raw; $('rawCard').style.display = 'flex'; }
  else { $('rawCard').style.display = 'none'; }
  addHistory(text); resetUI();
}

function resetUI() {
  $('micBtn').classList.remove('recording','processing');
  $('micIcon').style.display = 'block'; $('waveBars').style.display = 'none'; $('spinner').style.display = 'none';
  $('recLabel').textContent = 'Натисни за запис'; $('recLabel').className = 'rec-label';
}

function addHistory(text) {
  history.unshift({ text, time: new Date() });
  if (history.length > 10) history.pop();
  renderHistory();
}

function renderHistory() {
  const sec = $('historySec'), list = $('historyList');
  if (!history.length) { sec.style.display = 'none'; return; }
  sec.style.display = 'flex';
  list.innerHTML = history.map((h,i) => {
    const t = h.time.toLocaleTimeString('bg-BG',{hour:'2-digit',minute:'2-digit'});
    return `<div class="history-item" onclick="loadHistory(${i})"><span class="history-time">${t}</span><span class="history-preview">${h.text}</span></div>`;
  }).join('');
}

function loadHistory(i) {
  currentText = history[i].text;
  $('resultText').textContent = currentText; $('resultText').className = 'result-text';
  $('copyBtn').disabled = false; $('shareBtn').disabled = false;
}

function clearHist() { history = []; renderHistory(); }

function copyText() {
  if (!currentText) return;
  navigator.clipboard.writeText(currentText).then(() => showToast('Копирано!')).catch(() => prompt('Копирай ръчно:', currentText));
}

function shareText() { navigator.share ? navigator.share({ text: currentText }) : copyText(); }

function showToast(msg) {
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
